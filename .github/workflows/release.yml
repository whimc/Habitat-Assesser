name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Get QRF Agent version
        id: qrf
        run: |
          QRF=$(mvn help:evaluate -Dexpression=qrf.agent.version -q -DforceStdout)
          echo "version=$QRF" >> "$GITHUB_OUTPUT"

      - name: Download QRF Agent dependency
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p lib
          gh release download "v${{ steps.qrf.outputs.version }}" \
            --repo whimc/qrf-agent \
            --pattern "WHIMC-OverworldAgent-${{ steps.qrf.outputs.version }}.jar" \
            --dir lib
          cp "lib/WHIMC-OverworldAgent-${{ steps.qrf.outputs.version }}.jar" \
            "lib/WHIMC-QRF-Agent-${{ steps.qrf.outputs.version }}.jar"

      - name: Get current version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          NEXT=$(echo "$VERSION" | awk -F. '{print $1"."$2"."$3+1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Build
        run: mvn -B clean package

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: target/WHIMC-Habitat-Assesser-${{ steps.version.outputs.version }}.jar
          generate_release_notes: true

      - name: Bump version for next release
        run: |
          mvn -B versions:set -DnewVersion=${{ steps.version.outputs.next }} -DgenerateBackupPoms=false
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "Bump version to ${{ steps.version.outputs.next }} [skip ci]"
          git push
